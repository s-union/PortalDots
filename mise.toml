[tools]
node = "24.16.0"
go = "1.26.3"
sqlc = "1.31.1"
staticcheck = "2026.1"
air = "1.65.3"
prek = "0.4.1"
pnpm = "11.2.1"

[tasks."frontend:install"]
description = "Install dependencies for the new frontend workspace"
run = "pnpm install"

[tasks."frontend:dev"]
description = "Start vue vite dev server"
dir = "frontend"
run = "pnpm run dev -- --host 127.0.0.1"

[tasks."frontend:check"]
description = "Run frontend static checks"
run = "pnpm run ci:check"

[tasks."frontend:format"]
description = "Run frontend formatter"
run = "pnpm run format"

[tasks."email:dev"]
description = "Start the email Worker dev server (HTTP + queue consumer)"
dir = "packages/email"
run = "pnpm run dev:local-stack"

[tasks.dev]
description = "Reset local db, then start backend and frontend with mock email delivery"
run = "go run ./scripts/dev.go"
env = { _.file = ".env" }

[tasks."dev:worker"]
description = "Reset local db, then start backend, frontend, and local email Workers"
run = "go run ./scripts/dev.go worker"
env = { _.file = ".env" }

[tasks."backend:dev"]
description = "Start the new Go API"
dir = "backend"
run = "air -c .air.toml"
env = { _.file = ".env" }

[tasks."db:up"]
description = "Start local PostgreSQL container"
run = "docker compose -f docker-compose.postgres.yml up -d postgres"

[tasks."db:down"]
description = "Stop local PostgreSQL container"
run = "docker compose -f docker-compose.postgres.yml down"

[tasks."db:delete"]
description = "Stop local PostgreSQL container and delete its volume"
run = "docker compose -f docker-compose.postgres.yml down -v"

[tasks."backend:migrate"]
description = "Apply backend SQL migrations against PORTAL_DATABASE_URL"
dir = "backend"
run = "go run ./scripts/migrate/main.go"
env = { _.file = ".env" }

[tasks."backend:seed"]
description = "Seed or sync demo data against PORTAL_DATABASE_URL"
dir = "backend"
run = "go run ./scripts/seed/main.go"
env = { _.file = ".env" }

[tasks."backend:test"]
description = "Run Go tests for backend"
dir = "backend"
run = "go test ./..."

[tasks."backend:cover"]
description = "Run Go tests with coverage for backend"
dir = "backend"
run = "mkdir -p ../generated/go && go test -coverprofile=../generated/go/backend-cover.out ./..."

[tasks."backend:check"]
description = "Run staticcheck for Go backend"
dir = "backend"
run = "staticcheck ./..."

[tasks."backend:format"]
description = "Run go fmt"
dir = "backend"
run = "go fmt ./..."

[tasks."backend:sqlc:generate"]
description = "Generate Go code from backend sqlc queries"
dir = "backend"
run = "sqlc generate"

[tasks."backend:sqlc:smoke"]
description = "Run the sqlc smoke command against PORTAL_DATABASE_URL"
dir = "backend"
run = "go run ./scripts/sqlc-smoke/main.go"
env = { _.file = ".env" }

[tasks."e2e:worker"]
description = "Run e2e integration tests against the real dev:worker stack"
dir = "frontend"
run = "unset NO_COLOR; pnpm exec playwright test --config=playwright.integration.config.ts --workers=1"

[tasks."email:check"]
description = "Run static checks for the email Worker"
dir = "packages/email"
run = "pnpm run ci:check"

[tasks."email:test"]
description = "Run tests for the email Worker"
dir = "packages/email"
run = "pnpm run test"

[tasks.format]
description = "Run all formatters"
run = "mise run format:run"
