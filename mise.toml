[tools]
node = "24"
go = "1.26"
sqlc = "1.30.0"
staticcheck = "latest"
air = "latest"
prek = "latest"

[tasks.frontend-install]
description = "Install dependencies for the new frontend workspace"
run = "ni"

[tasks.dev]
description = "Reset local db, then start backend and frontend dev servers"
run = "go run ./scripts/dev.go"

[tasks.frontend-dev]
description = "Start vue vite dev server"
dir = "frontend"
run = "pnpm run dev -- --host 127.0.0.1"

[tasks.frontend-check]
description = "Run frontend static checks"
run = "nr ci:check"

[tasks.frontend-format]
description = "Run frontend formatter"
run = "nr format"

[tasks.frontend-generate]
description = "Run openapi-typescript"
dir = "packages/api-client"
run = "nr codegen:api"

[tasks.email-templates-dev]
description = "Start the React Email preview server"
dir = "packages/email-templates"
run = "nr dev"

[tasks.email-templates-generate]
description = "Generate Go email templates from React Email sources"
dir = "packages/email-templates"
run = "nr generate"

[tasks.email-templates-check]
description = "Run static checks for the React Email workspace"
dir = "packages/email-templates"
run = "nr typecheck:tsc"

[tasks.backend-dev]
description = "Start the new Go API"
dir = "backend"
run = "air -c .air.toml"

[tasks.db-up]
description = "Start local PostgreSQL container"
run = "docker compose -f docker-compose.postgres.yml up -d postgres"

[tasks.db-down]
description = "Stop local PostgreSQL container"
run = "docker compose -f docker-compose.postgres.yml down"

[tasks."db:delete"]
description = "Stop local PostgreSQL container and delete its volume"
run = "docker compose -f docker-compose.postgres.yml down -v"

[tasks.backend-migrate]
description = "Apply backend SQL migrations against PORTALDOTS_DATABASE_URL"
dir = "backend"
run = "go run ./cmd/migrate"

[tasks.backend-seed]
description = "Seed or sync demo data against PORTALDOTS_DATABASE_URL"
dir = "backend"
run = "go run ./cmd/seed"

[tasks.backend-test]
description = "Run Go tests for backend"
dir = "backend"
run = "go test ./..."

[tasks.backend-cover]
description = "Run Go tests with coverage for backend"
dir = "backend"
run = "mkdir -p ../generated/go && go test -coverprofile=../generated/go/backend-cover.out ./..."

[tasks.backend-check]
description = "Run staticcheck for Go backend"
dir = "backend"
run = "staticcheck ./..."

[tasks.backend-format]
description = "Run go fmt"
dir = "backend"
run = "go fmt ./..."

[tasks.backend-sqlc-generate]
description = "Generate Go code from backend sqlc queries"
dir = "backend"
run = "sqlc generate"

[tasks.backend-sqlc-smoke]
description = "Run the sqlc smoke command against PORTALDOTS_DATABASE_URL"
dir = "backend"
run = "go run ./cmd/sqlc-smoke"

[tasks.generate]
description = "Run code generation for frontend, email templates, and backend"
depends = ["frontend-generate", "email-templates-generate", "backend-sqlc-generate"]

[tasks.check]
depends = ["generate", "frontend-check", "email-templates-check", "backend-check"]

[tasks.prepare]
description = "Install dependencies and regenerate assets needed before startup"
depends = ["frontend-install", "generate"]

[tasks.format]
depends = ["frontend-format", "backend-format"]
