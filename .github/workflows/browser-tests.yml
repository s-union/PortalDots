name: Frontend Browser Tests

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend-e2e:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/4", "2/4", "3/4", "4/4"]
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Prepare local dev configuration
        run: |
          cp .env.example .env
          cp packages/email/.dev.vars.example packages/email/.dev.vars

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @portaldots/frontend exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @portaldots/frontend exec playwright install-deps chromium

      - name: Generate API client
        run: mise run api:client:codegen

      - name: Build (generates typed-router.d.ts)
        run: pnpm --filter @portaldots/frontend run build

      - name: Test e2e
        run: mise run e2e:worker
        env:
          PORTALDOTS_E2E_SHARD: ${{ matrix.shard }}

  frontend-storybook:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-storybook')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @portaldots/frontend exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @portaldots/frontend exec playwright install-deps chromium

      - name: Generate API client
        run: mise run api:client:codegen

      - name: Build (generates typed-router.d.ts)
        run: pnpm --filter @portaldots/frontend run build

      - name: Test storybook
        run: mise run frontend:test:storybook
