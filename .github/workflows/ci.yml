name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - 5.x_development

permissions:
  contents: read
  attestations: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'packages/api-client/**'
              - 'pnpm-lock.yaml'
              - 'mise.toml'
              - '.github/workflows/ci.yml'

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Generate API client
        run: mise run api:client:codegen

      - name: Build (generates typed-router.d.ts)
        run: pnpm --filter @portaldots/frontend run build

      - name: Check
        run: mise run frontend:check

  frontend-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @portaldots/frontend exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @portaldots/frontend exec playwright install-deps chromium

      - name: Generate API client
        run: mise run api:client:codegen

      - name: Build (generates typed-router.d.ts)
        run: pnpm --filter @portaldots/frontend run build

      - name: Test
        run: mise run frontend:test

  email-producer-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Check
        run: mise run email:producer:check

  email-producer-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Test
        run: mise run email:producer:test

  email-consumer-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Check
        run: mise run email:consumer:check

  email-consumer-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Test
        run: mise run email:consumer:test

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Generate sqlc
        run: mise run backend:sqlc:generate

      - name: Check
        run: mise run backend:check

  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: portaldots
          POSTGRES_PASSWORD: portaldots
          POSTGRES_DB: portaldots_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PORTAL_DATABASE_URL: postgres://portaldots:portaldots@localhost:5432/portaldots_test

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Generate
        run: mise run generate

      - name: Migrate
        run: mise run backend:migrate

      - name: Test
        run: mise run backend:test
