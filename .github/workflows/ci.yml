name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - 5.x_development

permissions:
  contents: read
  attestations: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Generate API client
        run: mise run api:client:codegen

      - name: Build (generates typed-router.d.ts)
        run: pnpm --filter @portaldots/frontend run build

      - name: Check
        run: mise run frontend:check

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Generate API client
        run: mise run api:client:codegen

      - name: Build (generates typed-router.d.ts)
        run: pnpm --filter @portaldots/frontend run build

      - name: Test unit
        run: mise run frontend:test

  email-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Check
        run: mise run email:check

  email-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Test
        run: mise run email:test

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Generate sqlc
        run: mise run backend:sqlc:generate

      - name: Check
        run: mise run backend:check

  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: portaldots
          POSTGRES_PASSWORD: portaldots
          POSTGRES_DB: portaldots_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PORTAL_DATABASE_URL: postgres://portaldots:portaldots@localhost:5432/portaldots_test

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install JS dependencies
        run: mise run frontend:install

      - name: Generate
        run: mise run generate

      - name: Migrate
        run: mise run backend:migrate

      - name: Test
        run: mise run backend:test
