name: Rebuild CI

on:
  push:
    branches:
      - 5.x
      - 5.x_development
      - gonext
    paths:
      - "backend/**"
      - "frontend/**"
      - "packages/**"
      - "mise.toml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/rebuild_ci.yml"
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "backend/**"
      - "frontend/**"
      - "packages/**"
      - "mise.toml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/rebuild_ci.yml"

concurrency:
  group: rebuild-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: portaldots_rebuild
          POSTGRES_USER: portaldots
          POSTGRES_PASSWORD: portaldots
        options: >-
          --health-cmd="pg_isready -U portaldots -d portaldots_rebuild"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      PORTALDOTS_DATABASE_URL: postgres://portaldots:portaldots@127.0.0.1:5432/portaldots_rebuild?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend toolchain
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Generate email templates
        working-directory: packages/email-templates
        run: pnpm run generate

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 ./...

      - name: SQLC smoke
        run: go run ./cmd/sqlc-smoke

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API client
        working-directory: packages/api-client
        run: pnpm run codegen:api

      - name: Check API client
        working-directory: packages/api-client
        run: pnpm run ci:check

      - name: Test API client
        working-directory: packages/api-client
        run: pnpm run test

      - name: Check email templates
        working-directory: packages/email-templates
        run: pnpm run typecheck

      - name: Check frontend
        working-directory: frontend
        run: pnpm run ci:check

      - name: Test frontend
        working-directory: frontend
        run: pnpm run test

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: frontend
        run: pnpm run test:e2e
