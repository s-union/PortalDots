services:
  postgres:
    image: postgres:18
    ports:
      - "127.0.0.1:55432:5432"
    environment:
      POSTGRES_DB: portaldots_rebuild
      POSTGRES_USER: portaldots
      POSTGRES_PASSWORD: portaldots
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portaldots -d portaldots_rebuild"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - portaldots-postgres-data:/var/lib/postgresql
      - ./backend/db/migrations:/migrations:ro

volumes:
  portaldots-postgres-data:
