services:
  postgres:
    image: postgres:18.4-bookworm@sha256:efef99e1558f86089bc84bece29208c0777a185ff717ec7fa288a652ce2d0adf
    ports:
      - "127.0.0.1:55432:5432"
    environment:
      POSTGRES_DB: portaldots_rebuild
      POSTGRES_USER: portaldots
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portaldots -d portaldots_rebuild"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - portaldots-postgres-data:/var/lib/postgresql
      - ./backend/db/migrations:/migrations:ro

volumes:
  portaldots-postgres-data:
