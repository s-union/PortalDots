openapi: 3.1.0
info:
  title: PortalDots API
  version: 0.1.0
servers:
  - url: http://127.0.0.1:8080/v1
paths:
  /auth/login:
    post:
      operationId: postAuthLogin
      summary: Authenticate with a login identifier and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loginId, password]
              properties:
                loginId:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 1
                remember:
                  type: boolean
                  default: false
      responses:
        "204":
          description: Authenticated
        "422":
          description: Validation or authentication error
          content:
            application/json:
              schema:
                type: object
                required: [message, errors]
                properties:
                  message:
                    type: string
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
  /auth/logout:
    post:
      operationId: postAuthLogout
      summary: Clear the current authenticated session
      responses:
        "204":
          description: Logged out
  /auth/register:
    post:
      operationId: postAuthRegister
      summary: Register a new participant account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  studentId,
                  univemailLocalPart,
                  univemailDomainPart,
                  name,
                  nameYomi,
                  contactEmail,
                  phoneNumber,
                  password,
                  passwordConfirmation,
                ]
              properties:
                studentId:
                  type: string
                univemailLocalPart:
                  type: string
                univemailDomainPart:
                  type: string
                name:
                  type: string
                nameYomi:
                  type: string
                contactEmail:
                  type: string
                phoneNumber:
                  type: string
                password:
                  type: string
                passwordConfirmation:
                  type: string
      responses:
        "204":
          description: Registered and logged in
        "422":
          description: Validation error
  /auth/register/start:
    post:
      operationId: postAuthRegisterStart
      summary: Start participant registration with a university email address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [univemailLocalPart]
              properties:
                univemailLocalPart:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Verification email request accepted
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
        "422":
          description: Validation error
  /auth/register/verify:
    post:
      operationId: postAuthRegisterVerify
      summary: Verify a pending participant registration URL token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pendingRegistrationId, token]
              properties:
                pendingRegistrationId:
                  type: string
                  minLength: 1
                token:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Pending registration verified
          content:
            application/json:
              schema:
                type: object
                required: [pendingRegistrationId, univemail, studentId, verified]
                properties:
                  pendingRegistrationId:
                    type: string
                  univemail:
                    type: string
                  studentId:
                    type: string
                  verified:
                    type: boolean
        "422":
          description: Validation error
  /auth/register/complete:
    post:
      operationId: postAuthRegisterComplete
      summary: Complete participant registration after university email verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  pendingRegistrationId,
                  token,
                  name,
                  nameYomi,
                  phoneNumber,
                  password,
                  passwordConfirmation,
                ]
              properties:
                pendingRegistrationId:
                  type: string
                  minLength: 1
                token:
                  type: string
                  minLength: 1
                name:
                  type: string
                  minLength: 1
                nameYomi:
                  type: string
                  minLength: 1
                contactEmail:
                  type: string
                phoneNumber:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 1
                passwordConfirmation:
                  type: string
                  minLength: 1
      responses:
        "204":
          description: Registered and logged in
        "422":
          description: Validation error
  /auth/password/reset/start:
    post:
      operationId: postAuthPasswordResetStart
      summary: Send a password reset URL to the user's contact email if the account exists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loginId]
              properties:
                loginId:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Reset request accepted
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
        "422":
          description: Validation error
  /auth/password/reset/verify:
    post:
      operationId: postAuthPasswordResetVerify
      summary: Verify a password reset URL token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, token]
              properties:
                userId:
                  type: string
                  minLength: 1
                token:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Password reset token is valid
          content:
            application/json:
              schema:
                type: object
                required: [userId, valid]
                properties:
                  userId:
                    type: string
                  valid:
                    type: boolean
        "422":
          description: Validation error
  /auth/password/reset/complete:
    post:
      operationId: postAuthPasswordResetComplete
      summary: Complete password reset and set a new password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, token, password, passwordConfirmation]
              properties:
                userId:
                  type: string
                  minLength: 1
                token:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 1
                passwordConfirmation:
                  type: string
                  minLength: 1
      responses:
        "204":
          description: Password reset completed
        "422":
          description: Validation error
  /auth/verification:
    get:
      operationId: getAuthVerification
      summary: Return participant verification status
      responses:
        "200":
          description: Verification status
          content:
            application/json:
              schema:
                type: object
                required: [userId, displayName, completed, items]
                properties:
                  userId:
                    type: string
                  displayName:
                    type: string
                  completed:
                    type: boolean
                  items:
                    type: array
                    items:
                      type: object
                      required: [type, label, address, verified]
                      properties:
                        type:
                          type: string
                          enum: [email, univemail]
                        label:
                          type: string
                        address:
                          type: string
                        verified:
                          type: boolean
        "401":
          description: Unauthenticated
  /auth/verification/request:
    post:
      operationId: postAuthVerificationRequest
      summary: Request a participant verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [email, univemail]
      responses:
        "200":
          description: Verification code request accepted
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
        "401":
          description: Unauthenticated
        "403":
          description: Creating a new circle is not allowed for this user
        "422":
          description: Validation error
  /auth/verification/confirm:
    post:
      operationId: postAuthVerificationConfirm
      summary: Confirm a participant verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, verifyCode]
              properties:
                type:
                  type: string
                  enum: [email, univemail]
                verifyCode:
                  type: string
      responses:
        "204":
          description: Verification completed
        "401":
          description: Unauthenticated
        "422":
          description: Validation error
  /contact-categories:
    get:
      operationId: getContactCategories
      summary: Return contact categories visible to authenticated users
      responses:
        "200":
          description: Contact categories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [id, name]
                  properties:
                    id:
                      type: string
                    name:
                      type: string
        "401":
          description: Unauthenticated
  /contact:
    get:
      operationId: getContactHistory
      summary: Return contact submissions for the current user and circle context
      responses:
        "200":
          description: Contact submission history
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [id, categoryId, categoryName, subject, status, createdAt]
                  properties:
                    id:
                      type: string
                    categoryId:
                      type: string
                    categoryName:
                      type: string
                    subject:
                      type: string
                    status:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
        "401":
          description: Unauthenticated
        "409":
          description: Current circle is not selected
    post:
      operationId: postContact
      summary: Submit a contact message for the current circle context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryId, subject, body]
              properties:
                categoryId:
                  type: string
                subject:
                  type: string
                  minLength: 1
                body:
                  type: string
                  minLength: 1
      responses:
        "201":
          description: Submitted contact
          content:
            application/json:
              schema:
                type: object
                required: [id, categoryId, categoryName, subject, status, createdAt]
                properties:
                  id:
                    type: string
                  categoryId:
                    type: string
                  categoryName:
                    type: string
                  subject:
                    type: string
                  status:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
        "401":
          description: Unauthenticated
        "409":
          description: Current circle is not selected
  /staff/status:
    get:
      operationId: getStaffStatus
      summary: Return whether the current user can access and has authorized staff mode
      responses:
        "200":
          description: Staff mode status
          content:
            application/json:
              schema:
                type: object
                required: [allowed, authorized]
                properties:
                  allowed:
                    type: boolean
                  authorized:
                    type: boolean
        "401":
          description: Unauthenticated
        "403":
          description: Staff access is not available for this user
  /staff/verify/request:
    post:
      operationId: postStaffVerifyRequest
      summary: Start the staff verification flow for the current session
      responses:
        "200":
          description: Verification code request accepted
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                  verifyCode:
                    type: string
                    description: Demo mode only. Included when insecure defaults are enabled.
        "401":
          description: Unauthenticated
        "403":
          description: Staff mode is not available for this user
  /staff/verify/confirm:
    post:
      operationId: postStaffVerifyConfirm
      summary: Confirm the staff verification code for the current session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [verifyCode]
              properties:
                verifyCode:
                  type: string
                  minLength: 1
      responses:
        "204":
          description: Staff mode authorized
        "401":
          description: Unauthenticated
        "403":
          description: Staff mode is not available for this user
        "422":
          description: Validation error
  /staff/pages:
    get:
      operationId: getStaffPages
      summary: Return globally managed notices from staff mode
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Staff page list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [id, title, notes, createdAt, updatedAt, isPinned, isPublic, viewableTags, documentIds, documents]
                  properties:
                    id:
                      type: string
                    title:
                      type: string
                    notes:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
                    updatedAt:
                      type: string
                      format: date-time
                    isPinned:
                      type: boolean
                    isPublic:
                      type: boolean
                    viewableTags:
                      type: array
                      items:
                        type: string
                    documentIds:
                      type: array
                      items:
                        type: string
                    documents:
                      type: array
                      items:
                        type: object
                        required: [id, name, description, isImportant, extension, sizeBytes, updatedAt, downloadUrl]
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          description:
                            type: string
                          isImportant:
                            type: boolean
                          extension:
                            type: string
                          sizeBytes:
                            type: integer
                            format: int64
                          updatedAt:
                            type: string
                            format: date-time
                          downloadUrl:
                            type: string
        "401":
          description: Unauthenticated
        "403":
          description: Staff verification is required
    post:
      operationId: postStaffPages
      summary: Create a globally managed notice from staff mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, body, isPublic]
              properties:
                title:
                  type: string
                  minLength: 1
                body:
                  type: string
                  minLength: 1
                notes:
                  type: string
                viewableTags:
                  type: array
                  items:
                    type: string
                documentIds:
                  type: array
                  items:
                    type: string
                sendEmails:
                  type: boolean
                isPinned:
                  type: boolean
                isPublic:
                  type: boolean
      responses:
        "201":
          description: Created page
          content:
            application/json:
              schema:
                type: object
                required: [id, title, notes, createdAt, updatedAt, isPinned, isPublic, viewableTags, documentIds, documents]
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  notes:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
                  isPinned:
                    type: boolean
                  isPublic:
                    type: boolean
                  viewableTags:
                    type: array
                    items:
                      type: string
                  documentIds:
                    type: array
                    items:
                      type: string
                  documents:
                    type: array
                    items:
                      type: object
                      required: [id, name, description, isImportant, extension, sizeBytes, updatedAt, downloadUrl]
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        isImportant:
                          type: boolean
                        extension:
                          type: string
                        sizeBytes:
                          type: integer
                          format: int64
                        updatedAt:
                          type: string
                          format: date-time
                        downloadUrl:
                          type: string
        "401":
          description: Unauthenticated
        "403":
          description: Staff verification is required
        "422":
          description: Validation error
  /staff/pages/export.csv:
    get:
      operationId: getStaffPagesExportCsv
      summary: Export globally managed notices from staff mode as CSV
      responses:
        "200":
          description: Staff pages CSV
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthenticated
        "403":
          description: Staff verification is required
  /staff/pages/{pageID}:
    parameters:
      - in: path
        name: pageID
        required: true
        schema:
          type: string
    get:
      operationId: getStaffPageById
      summary: Return a globally managed notice from staff mode
      responses:
        "200":
          description: Staff page detail
          content:
            application/json:
              schema:
                type: object
                required:
                  [id, title, body, notes, createdAt, updatedAt, isPinned, isPublic, viewableTags, documentIds, documents]
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  body:
                    type: string
                  notes:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
                  isPinned:
                    type: boolean
                  isPublic:
                    type: boolean
                  viewableTags:
                    type: array
                    items:
                      type: string
                  documentIds:
                    type: array
                    items:
                      type: string
                  documents:
                    type: array
                    items:
                      type: object
                      required: [id, name, description, isImportant, extension, sizeBytes, updatedAt, downloadUrl]
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        isImportant:
                          type: boolean
                        extension:
                          type: string
                        sizeBytes:
                          type: integer
                          format: int64
                        updatedAt:
                          type: string
                          format: date-time
                        downloadUrl:
                          type: string
        "401":
          description: Unauthenticated
        "403":
          description: Staff verification is required
        "404":
          description: Page not found
    put:
      operationId: putStaffPageById
      summary: Update a globally managed notice from staff mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, body, isPublic]
              properties:
                title:
                  type: string
                  minLength: 1
                body:
                  type: string
                  minLength: 1
                notes:
                  type: string
                viewableTags:
                  type: array
                  items:
                    type: string
                documentIds:
                  type: array
                  items:
                    type: string
                sendEmails:
                  type: boolean
                isPinned:
                  type: boolean
                isPublic:
                  type: boolean
      responses:
        "200":
          description: Updated page
          content:
            application/json:
              schema:
                type: object
                required: [id, title, notes, createdAt, updatedAt, isPinned, isPublic, viewableTags, documentIds, documents]
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  notes:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
                  isPinned:
                    type: boolean
                  isPublic:
                    type: boolean
                  viewableTags:
                    type: array
                    items:
                      type: string
                  documentIds:
                    type: array
                    items:
                      type: string
                  documents:
                    type: array
                    items:
                      type: object
                      required: [id, name, description, isImportant, extension, sizeBytes, updatedAt, downloadUrl]
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        isImportant:
                          type: boolean
                        extension:
                          type: string
                        sizeBytes:
                          type: integer
                          format: int64
                        updatedAt:
                          type: string
                          format: date-time
                        downloadUrl:
                          type: string
        "401":
          description: Unauthenticated
        "403":
          description: Staff verification is required
        "404":
          description: Page not found
        "422":
          description: Validation error
    delete:
      operationId: deleteStaffPageById
      summary: Delete a globally managed notice from staff mode
      responses:
        "204":
          description: Page deleted
        "401":
          description: Unauthenticated
        "403":
          description: Staff verification is required
        "404":
          description: Page not found
  /staff/pages/{pageID}/pin:
    parameters:
      - in: path
        name: pageID
        required: true
        schema:
          type: string
    patch:
      operationId: patchStaffPagePin
      summary: Update global notice pin status from staff mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isPinned:
                  type: boolean
      responses:
        "200":
          description: Updated page pin status
          content:
            application/json:
              schema:
                type: object
                required: [id, title, notes, createdAt, updatedAt, isPinned, isPublic, viewableTags, documentIds, documents]
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  notes:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
                  isPinned:
                    type: boolean
                  isPublic:
                    type: boolean
                  viewableTags:
                    type: array
                    items:
                      type: string
                  documentIds:
                    type: array
                    items:
                      type: string
                  documents:
                    type: array
                    items:
                      type: object
                      required: [id, name, description, isImportant, extension, sizeBytes, updatedAt, downloadUrl]
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        isImportant:
                          type: boolean
                        extension:
                          type: string
                        sizeBytes:
                          type: integer
                          format: int64
                        updatedAt:
                          type: string
                          format: date-time
                        downloadUrl:
                          type: string
        "401":
          description: Unauthenticated
        "403":
          description: Staff verification is required
        "404":
          description: Page not found
        "409":
          description: Current circle is not selected
  /staff/forms:
    get:
      operationId: getStaffForms
      summary: Return current-circle forms visible from staff mode
      responses:
        "200":
          description: Staff form list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    [id, name, description, openAt, closeAt, maxAnswers, answerableTags, confirmationMessage, isPublic, isOpen, createdAt, updatedAt, isParticipationForm]
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    description:
                      type: string
                    openAt:
                      type: string
                      format: date-time
                    closeAt:
                      type: string
                      format: date-time
                    maxAnswers:
                      type: integer
                    answerableTags:
                      type: array
                      items:
                        type: string
                    confirmationMessage:
                      type: string
                    isPublic:
                      type: boolean
                    isOpen:
                      type: boolean
                    createdAt:
                      type: string
                      format: date-time
                    updatedAt:
                      type: string
                      format: date-time
                    isParticipationForm:
                      type: boolean
        "401":
          description: Unauthenticated
        "403":
          description: Staff verification is required
        "409":
          description: Current circle is not selected
        "422":
          description: Validation error
    post:
      operationId: postStaffForms
      summary: Create a form in the current circle from staff mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, openAt, closeAt, maxAnswers, isPublic]
              properties:
                name:
                  type: string
                  minLength: 1
                description:
                  type: string
                openAt:
                  type: string
                  format: date-time
                closeAt:
                  type: string
                  format: date-time
                maxAnswers:
                  type: integer
                  minimum: 1
                answerableTags:
                  type: array
                  items:
                    type: string
                confirmationMessage:
                  type: string
                isPublic:
                  type: boolean
      responses:
        "201":
          description: Created form
          content:
            application/json:
              schema:
                type: object
                required:
                  [id, name, description, openAt, closeAt, maxAnswers, answerableTags, confirmationMessage, isPublic, isOpen, createdAt, updatedAt, isParticipationForm]
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                  openAt:
                    type: string
                    format: date-time
                  closeAt:
                    type: string
                    format: date-time
                  maxAnswers:
                    type: integer
                  answerableTags:
                    type: array
                    items:
                      type: string
                  confirmationMessage:
                    type: string
                  isPublic:
                    type: boolean
                  isOpen:
                    type: boolean
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
                  isParticipationForm:
                    type: boolean
        "401":
          description: Unauthenticated
        "403":
          description: Staff verification is required
        "409":
          description: Current circle is not selected
        "422":
          description: Validation error
  /staff/forms/export:
    get:
      operationId: getStaffFormsExport
      summary: Export current-circle forms as CSV from staff mode
      responses:
        "200":
          description: Staff forms CSV
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthenticated
        "403":
          description: Staff verification is required
        "409":
          description: Current circle is not selected
  /staff/documents:
    get:
      operationId: getStaffDocuments
